# Profil PRODUCTION
spring.application.name=messaging

# PostgreSQL JDBC - Production
spring.datasource.url=jdbc:postgresql://prod-db.internal:5432/messaging_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=600000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# IBM MQ - Production
app.mq.queue-manager=PROD_QM1
app.mq.channel=PROD.APP.SVRCONN
app.mq.conn-name=prod-mq1.internal(1414);prod-mq2.internal(1414)
app.mq.username=${MQ_USERNAME}
app.mq.password=${MQ_PASSWORD}
app.mq.inbound-queue=PROD.QUEUE.1
app.mq.outbound-queue=PROD.QUEUE.1

# JMS resilience tuning
spring.jms.listener.session.acknowledge-mode=auto
spring.jms.listener.min-concurrency=10
spring.jms.listener.max-concurrency=50

# Logging
logging.level.root=WARN
logging.level.com.example.messaging=INFO

# Performance tuning
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

