spring.datasource.url=jdbc:h2:mem:messaging-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# JMS désactivé en test unitaire (listeners auto-startup = false)
spring.jms.listener.auto-startup=false

app.mq.queue-manager=QM1
app.mq.channel=DEV.APP.SVRCONN
app.mq.conn-name=localhost(1414)
app.mq.username=app
app.mq.password=passw0rd
app.mq.inbound-queue=DEV.QUEUE.1
app.mq.outbound-queue=DEV.QUEUE.1

# Logging
logging.level.root=WARN
logging.level.com.example.messaging=DEBUG

logging.level.org.hibernate.SQL=DEBUG

